name: Nightly map pull

on:
  schedule:
    - cron: "30 10 * * *"   # 10:30 UTC = 4:30/5:30 AM Central
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pull:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python ingest/pull_arcgis.py
      - run: python build/build_json.py
      - name: Monthly heartbeat
        run: date -u +%Y-%m > data/heartbeat.txt
      - name: Commit if changed
        run: |
          git config user.name "cleanup-ledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data public
          git diff --cached --quiet || git commit -m "Nightly map pull"
          git push
