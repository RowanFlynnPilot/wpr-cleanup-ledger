name: Nightly map pull

on:
  schedule:
    - cron: "30 10 * * *"   # 10:30 UTC = 4:30/5:30 AM Central
  workflow_dispatch:

permissions:
  contents: write

# Never let two data-pipeline runs mutate the DB and push concurrently.
# GitHub keeps at most ONE pending run per group and cancels the older
# pending run when a newer one queues — so don't stack manual dispatches
# while a run is in flight, and keep timeouts tight so a hung run can't
# hold the group hostage.
concurrency:
  group: data-pipeline

jobs:
  pull:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python ingest/pull_arcgis.py
      - run: python ingest/pull_pfas.py
      - run: python build/build_json.py
      - name: Monthly heartbeat
        run: date -u +%Y-%m > data/heartbeat.txt
      - name: Commit if changed
        id: commit
        run: |
          git config user.name "cleanup-ledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data public
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Nightly map pull"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  # Bot pushes don't fire push-triggered workflows, so redeploy explicitly —
  # but only when data actually changed (quiet-repo rule).
  deploy:
    needs: pull
    if: needs.pull.outputs.pushed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
