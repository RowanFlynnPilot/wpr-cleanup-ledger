name: Deploy widget to GitHub Pages

# Deploys on: widget/data pushes by humans, manual dispatch, and — because
# bot commits made with GITHUB_TOKEN never fire push events — explicit
# workflow_call from nightly.yml / quarterly.yml after they commit data.
on:
  push:
    branches: [main]
    paths:
      - "widget/**"
      - "public/data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widget/package-lock.json
      - run: npm ci
        working-directory: widget
      - run: npm run build
        working-directory: widget
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: widget/dist
      - id: deployment
        uses: actions/deploy-pages@v4
