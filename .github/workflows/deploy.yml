name: Deploy widget to GitHub Pages

# Deploys on: widget/data pushes by humans, manual dispatch, and — because
# bot commits made with GITHUB_TOKEN never fire push events — explicit
# workflow_call from nightly.yml / quarterly.yml after they commit data.
on:
  push:
    branches: [main]
    paths:
      - "widget/**"
      - "public/data/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Job-level, not workflow-level: a called workflow's TOP-LEVEL
    # concurrency is evaluated in the caller's context, so with
    # cancel-in-progress it can cancel the caller run itself (the whole
    # nightly pipeline) when a standalone deploy races it. Job-level
    # scopes the "pages" group to just this job. cancel-in-progress stays
    # off so an in-flight Pages deployment is never killed halfway; a
    # newer queued deploy replaces any older queued one (GitHub keeps one
    # pending slot per group), and since every deploy checks out main's
    # tip, whichever run survives ships the newest data.
    concurrency:
      group: pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      # ref: main, not the default github.sha — when called from
      # nightly/quarterly, github.sha was pinned when the caller STARTED,
      # which predates the data commit the caller just pushed. Deploying
      # that sha would publish stale data every time.
      - uses: actions/checkout@v4
        with:
          ref: main
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: widget/package-lock.json
      - run: npm ci
        working-directory: widget
      - run: npm run build
        working-directory: widget
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: widget/dist
      - id: deployment
        uses: actions/deploy-pages@v4
