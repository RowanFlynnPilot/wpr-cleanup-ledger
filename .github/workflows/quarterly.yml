name: Quarterly bulk ingest

on:
  schedule:
    - cron: "0 12 5 3,6,9,12 *"   # 5th of Mar/Jun/Sep/Dec; bulk publishes ~the 1st
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    outputs:
      pushed: ${{ steps.commit.outputs.pushed }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -r requirements.txt
      - run: python ingest/ingest_bulk.py
      - run: python build/build_json.py
      - name: Commit if changed
        id: commit
        run: |
          git config user.name "cleanup-ledger-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data public
          if git diff --cached --quiet; then
            echo "pushed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Quarterly bulk ingest"
            git push
            echo "pushed=true" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: ingest
    if: needs.ingest.outputs.pushed == 'true'
    uses: ./.github/workflows/deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
